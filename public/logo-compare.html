  @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  .card {
    background: #fff;
    border-radius: 24px;
    padding: 28px 16px 20px;
    text-align: center;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    transition: transform .2s, box-shadow .2s;
    cursor: pointer;
  }
  .card:hover { transform: translateY(-6px); box-shadow: 0 8px 32px rgba(0,0,0,0.13); }
  .card svg { width: 160px; height: 160px; display: block; margin: 0 auto; }
  .card .name { font-size: 13px; color: #8B95A1; margin-top: 12px; font-weight: 600; }
  .card .num  { font-size: 11px; color: #C0C7D0; margin-top: 2px; }
</style>
</head>
